{% extends "base.html" %}

{% block content %}
<h2>Доступные задачи</h2>
<table>
    <thead><tr><th>Название</th><th>Описание</th><th>Дедлайн</th><th></th></tr></thead>
    <tbody>
        {% for task in tasks %}
        <tr>
            <td>{{ task.name }}</td>
            <td>{{ task.description[:100] if task.description else '' }}</td>
            <td>{{ task.deadline or 'нет' }}</td>
            <td><a href="/apply/{{ task.id }}" class="btn">Откликнуться</a></td>
        </tr>
        {% else %}
        <tr><td colspan="4">Нет задач</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
