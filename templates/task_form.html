{% extends "base.html" %}

{% block content %}
<div class="form-card">
    <h2>{% if task %}Редактирование{% else %}Создание{% endif %} задачи</h2>
    <form method="POST">
        <input type="text" name="name" value="{{ task.name if task else '' }}" placeholder="Название" required>
        <textarea name="description" placeholder="Описание">{{ task.description if task else '' }}</textarea>
        <input type="date" name="deadline" value="{{ task.deadline if task else '' }}">
        <label><input type="checkbox" name="is_active" {% if not task or task.is_active %}checked{% endif %}> Активна</label>
        <button type="submit">Сохранить</button>
        <a href="/admin">Отмена</a>
    </form>
</div>
{% endblock %}
